<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b8f84">
  <title>生成AIパスポート Quest</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f7f5;
      --surface: #ffffff;
      --surface-2: #ecf4f1;
      --ink: #182421;
      --muted: #63716d;
      --line: #dce6e1;
      --teal: #0b8f84;
      --teal-dark: #076c65;
      --coral: #e85f4d;
      --gold: #f4b840;
      --blue: #276ef1;
      --green: #21a36b;
      --shadow: 0 12px 34px rgba(29, 48, 44, 0.13);
      --radius: 8px;
      --tap: 48px;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(11, 143, 132, 0.12), rgba(244, 247, 245, 0) 260px),
        var(--bg);
      letter-spacing: 0;
      -webkit-font-smoothing: antialiased;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    button:focus-visible {
      outline: 3px solid rgba(39, 110, 241, 0.35);
      outline-offset: 2px;
    }

    .app {
      width: min(100%, 520px);
      margin: 0 auto;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: env(safe-area-inset-top) 14px calc(env(safe-area-inset-bottom) + 16px);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 14px 0 10px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      flex: 0 0 auto;
      filter: drop-shadow(0 6px 10px rgba(11, 143, 132, 0.2));
    }

    .brand-title {
      margin: 0;
      font-size: clamp(1.05rem, 4vw, 1.32rem);
      line-height: 1.05;
      font-weight: 850;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .brand-sub {
      margin-top: 3px;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 650;
    }

    .icon-btn {
      width: var(--tap);
      height: var(--tap);
      display: inline-grid;
      place-items: center;
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--ink);
      box-shadow: 0 6px 18px rgba(29, 48, 44, 0.1);
      flex: 0 0 auto;
    }

    .icon {
      width: 21px;
      height: 21px;
      display: block;
      stroke: currentColor;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .screen {
      display: none;
      flex: 1;
      min-height: 0;
    }

    .screen.active {
      display: flex;
      flex-direction: column;
    }

    .home-main {
      gap: 14px;
    }

    .hero-band {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 132px;
      align-items: center;
      gap: 10px;
      min-height: 160px;
      padding: 16px;
      border: 1px solid rgba(11, 143, 132, 0.16);
      border-radius: var(--radius);
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.96), rgba(236, 244, 241, 0.96)),
        var(--surface);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .hero-copy {
      min-width: 0;
    }

    .hero-kicker {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--teal-dark);
      font-size: 0.78rem;
      font-weight: 800;
    }

    .hero-copy h2 {
      margin: 8px 0 0;
      font-size: clamp(1.45rem, 8vw, 2.2rem);
      line-height: 1.02;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .hero-copy p {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.55;
    }

    .hero-art {
      width: 132px;
      max-width: 100%;
      justify-self: end;
    }

    .stats-strip {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .metric {
      min-height: 76px;
      padding: 10px;
      border-radius: var(--radius);
      background: var(--surface);
      border: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .metric span {
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 800;
    }

    .metric strong {
      font-size: clamp(1.05rem, 5vw, 1.45rem);
      line-height: 1;
      overflow-wrap: anywhere;
    }

    .section-title {
      margin: 5px 0 2px;
      font-size: 0.86rem;
      font-weight: 850;
      color: var(--muted);
    }

    .mode-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .mode-btn {
      min-height: 112px;
      padding: 14px;
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--ink);
      border: 1px solid var(--line);
      text-align: left;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 12px;
      box-shadow: 0 8px 22px rgba(29, 48, 44, 0.08);
    }

    .mode-btn.primary {
      background: var(--teal);
      color: #fff;
      border-color: var(--teal);
    }

    .mode-btn.warn {
      background: #fff7e7;
      border-color: #f7dfad;
    }

    .mode-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-width: 0;
    }

    .mode-head svg {
      flex: 0 0 auto;
    }

    .mode-name {
      font-weight: 850;
      font-size: clamp(1rem, 4.5vw, 1.16rem);
      line-height: 1.18;
      overflow-wrap: anywhere;
    }

    .mode-meta {
      font-size: 0.78rem;
      line-height: 1.4;
      color: currentColor;
      opacity: 0.78;
    }

    .stage-grid {
      display: grid;
      gap: 8px;
    }

    .stage-btn {
      min-height: 58px;
      padding: 11px 12px;
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--ink);
      border: 1px solid var(--line);
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      text-align: left;
    }

    .stage-dot {
      width: 12px;
      height: 32px;
      border-radius: 99px;
      background: var(--teal);
    }

    .stage-name {
      font-size: 0.96rem;
      font-weight: 800;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .stage-score {
      font-size: 0.82rem;
      color: var(--muted);
      font-weight: 800;
      white-space: nowrap;
    }

    .quiz-header {
      position: sticky;
      top: env(safe-area-inset-top);
      z-index: 5;
      padding: 8px 0 10px;
      background:
        linear-gradient(180deg, rgba(244, 247, 245, 0.98), rgba(244, 247, 245, 0.9));
      backdrop-filter: blur(12px);
    }

    .hud-row {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
    }

    .hud-pill {
      min-height: 38px;
      padding: 8px 10px;
      border-radius: var(--radius);
      background: var(--surface);
      border: 1px solid var(--line);
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 0.84rem;
      font-weight: 850;
      white-space: nowrap;
    }

    .progress-wrap {
      min-width: 0;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 850;
      margin-bottom: 5px;
    }

    .bar {
      height: 10px;
      border-radius: 99px;
      background: #d7e5e0;
      overflow: hidden;
    }

    .bar > span {
      display: block;
      height: 100%;
      width: 0;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--teal), var(--gold));
      transition: width 220ms ease;
    }

    .quiz-main {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-bottom: 10px;
    }

    .question-panel {
      padding: 16px;
      border-radius: var(--radius);
      background: var(--surface);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .chapter-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 30px;
      padding: 5px 9px;
      border-radius: var(--radius);
      background: var(--surface-2);
      color: var(--teal-dark);
      font-size: 0.75rem;
      font-weight: 850;
      max-width: 100%;
      overflow-wrap: anywhere;
    }

    .multi-tag {
      margin-left: 6px;
      color: var(--coral);
    }

    .question-text {
      margin: 14px 0 0;
      font-size: clamp(1.12rem, 5vw, 1.42rem);
      line-height: 1.48;
      font-weight: 850;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .answers {
      display: grid;
      gap: 9px;
    }

    .answer-btn {
      width: 100%;
      min-height: 62px;
      padding: 12px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--ink);
      display: grid;
      grid-template-columns: 32px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      text-align: left;
      box-shadow: 0 7px 18px rgba(29, 48, 44, 0.07);
    }

    .answer-btn[disabled] {
      cursor: default;
      opacity: 1;
    }

    .answer-key {
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: var(--surface-2);
      color: var(--muted);
      font-weight: 900;
      font-size: 0.9rem;
    }

    .answer-text {
      min-width: 0;
      line-height: 1.45;
      font-weight: 750;
      overflow-wrap: anywhere;
    }

    .answer-btn.selected {
      border-color: var(--blue);
      background: #edf4ff;
    }

    .answer-btn.correct {
      border-color: rgba(33, 163, 107, 0.6);
      background: #eaf8f1;
    }

    .answer-btn.correct .answer-key {
      background: var(--green);
      color: #fff;
    }

    .answer-btn.wrong {
      border-color: rgba(232, 95, 77, 0.58);
      background: #fff0ed;
    }

    .answer-btn.wrong .answer-key {
      background: var(--coral);
      color: #fff;
    }

    .action-row {
      position: sticky;
      bottom: calc(env(safe-area-inset-bottom) + 8px);
      z-index: 4;
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 9px;
      padding-top: 2px;
    }

    .primary-btn,
    .ghost-btn {
      min-height: var(--tap);
      padding: 12px 14px;
      border-radius: var(--radius);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-weight: 850;
      line-height: 1.2;
      overflow-wrap: anywhere;
    }

    .primary-btn {
      background: var(--teal);
      color: #fff;
      box-shadow: 0 10px 22px rgba(11, 143, 132, 0.22);
    }

    .primary-btn:disabled {
      background: #a9bbb5;
      box-shadow: none;
      cursor: default;
    }

    .ghost-btn {
      background: var(--surface);
      color: var(--ink);
      border: 1px solid var(--line);
    }

    .explain {
      display: none;
      padding: 13px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: #fffdf7;
    }

    .explain.show {
      display: block;
    }

    .judge {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 900;
      margin-bottom: 7px;
    }

    .judge.good {
      color: var(--green);
    }

    .judge.bad {
      color: var(--coral);
    }

    .explain p {
      margin: 0;
      color: #4b5c57;
      font-size: 0.92rem;
      line-height: 1.58;
      overflow-wrap: anywhere;
    }

    .result-main {
      justify-content: center;
      gap: 13px;
      padding: 14px 0;
    }

    .result-panel {
      padding: 18px;
      border-radius: var(--radius);
      background: var(--surface);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      text-align: center;
    }

    .rank-badge {
      width: min(180px, 46vw);
      margin: 0 auto 10px;
      display: block;
    }

    .result-score {
      margin: 0;
      font-size: clamp(2.1rem, 12vw, 3.3rem);
      line-height: 1;
      font-weight: 950;
      letter-spacing: 0;
    }

    .result-title {
      margin: 7px 0 0;
      font-size: 1.05rem;
      font-weight: 850;
    }

    .result-note {
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.55;
      font-size: 0.9rem;
    }

    .breakdown {
      display: grid;
      gap: 8px;
    }

    .break-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 52px;
      gap: 8px;
      align-items: center;
      padding: 10px 12px;
      border-radius: var(--radius);
      background: var(--surface);
      border: 1px solid var(--line);
    }

    .break-name {
      min-width: 0;
      font-size: 0.87rem;
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .break-score {
      text-align: right;
      font-size: 0.86rem;
      color: var(--muted);
      font-weight: 850;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(env(safe-area-inset-bottom) + 16px);
      transform: translate(-50%, 20px);
      width: min(calc(100% - 28px), 480px);
      min-height: 48px;
      padding: 12px 14px;
      border-radius: var(--radius);
      background: #14201e;
      color: #fff;
      font-size: 0.9rem;
      font-weight: 750;
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease;
      z-index: 20;
      box-shadow: 0 16px 38px rgba(0, 0, 0, 0.24);
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .source-note {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.72rem;
      line-height: 1.45;
      text-align: center;
    }

    .source-note a {
      color: var(--teal-dark);
      font-weight: 800;
    }

    @media (max-width: 390px) {
      .app {
        padding-left: 10px;
        padding-right: 10px;
      }

      .hero-band {
        grid-template-columns: minmax(0, 1fr) 92px;
        padding: 13px;
      }

      .hero-art {
        width: 92px;
      }

      .mode-grid {
        grid-template-columns: 1fr;
      }

      .stats-strip {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (min-width: 780px) {
      .app {
        padding-top: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <header class="topbar">
      <div class="brand">
        <svg class="brand-mark" viewBox="0 0 64 64" aria-hidden="true">
          <defs>
            <linearGradient id="brandGradient" x1="9" x2="56" y1="8" y2="58">
              <stop stop-color="#0b8f84"></stop>
              <stop offset="0.58" stop-color="#21a36b"></stop>
              <stop offset="1" stop-color="#f4b840"></stop>
            </linearGradient>
          </defs>
          <rect x="8" y="7" width="48" height="52" rx="8" fill="url(#brandGradient)"></rect>
          <path d="M21 21h22M21 32h14M21 43h22" stroke="#fff" stroke-width="4" stroke-linecap="round"></path>
          <circle cx="43" cy="32" r="5" fill="#fff"></circle>
        </svg>
        <div>
          <h1 class="brand-title">生成AIパスポート Quest</h1>
          <div class="brand-sub">オリジナル練習問題</div>
        </div>
      </div>
      <button class="icon-btn" id="resetBtn" type="button" aria-label="進捗をリセット" title="進捗をリセット">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 12a9 9 0 1 0 3-6.7"></path><path d="M3 4v6h6"></path></svg>
      </button>
    </header>

    <main class="screen active home-main" id="homeScreen"></main>
    <main class="screen" id="quizScreen"></main>
    <main class="screen result-main" id="resultScreen"></main>
  </div>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const STORAGE_KEY = "genai-passport-quest-v1";

    const CHAPTERS = [
      { id: "ai", label: "第1章 AI（人工知能）", short: "AI基礎", color: "#0b8f84" },
      { id: "genai", label: "第2章 生成AI", short: "生成AI", color: "#276ef1" },
      { id: "trend", label: "第3章 現在の生成AIの動向", short: "動向", color: "#e85f4d" },
      { id: "literacy", label: "第4章 情報リテラシー・AI社会原則", short: "リスク", color: "#21a36b" },
      { id: "prompt", label: "第5章 プロンプト制作と実例", short: "プロンプト", color: "#f4b840" }
    ];

    const QUESTIONS = [
      {
        id: "ai-01",
        chapter: "ai",
        type: "single",
        text: "大量の取引履歴と「不正かどうか」の正解ラベルを使ってモデルを学習する方法として最も適切なものはどれですか。",
        choices: ["教師あり学習", "教師なし学習", "強化学習", "ルールベース推論"],
        answer: [0],
        explanation: "入力と正解ラベルのペアから関係を学ぶため、教師あり学習に該当します。"
      },
      {
        id: "ai-02",
        chapter: "ai",
        type: "single",
        text: "購買データを似た傾向の顧客グループに分けたい場合、代表的に使われる手法はどれですか。",
        choices: ["クラスタリング", "過学習", "バックアップ", "暗号化"],
        answer: [0],
        explanation: "正解ラベルなしでデータの近さや構造からグループを見つける処理はクラスタリングです。"
      },
      {
        id: "ai-03",
        chapter: "ai",
        type: "single",
        text: "学習データには高精度だが未知データで性能が落ちる状態を何と呼びますか。",
        choices: ["過学習", "次元削減", "転移学習", "自己注意"],
        answer: [0],
        explanation: "学習データに合わせ込みすぎ、汎化性能が低い状態を過学習と呼びます。"
      },
      {
        id: "ai-04",
        chapter: "ai",
        type: "single",
        text: "すでに学習済みの画像認識モデルを別の画像分類に活用する考え方として最も近いものはどれですか。",
        choices: ["転移学習", "量子化", "フィッシング", "匿名加工"],
        answer: [0],
        explanation: "あるタスクで得た知識を関連タスクに使う方法が転移学習です。"
      },
      {
        id: "ai-05",
        chapter: "ai",
        type: "single",
        text: "ニューラルネットワークにおける重みは、主に何を表しますか。",
        choices: ["入力の影響度を調整する値", "データの著作権情報", "通信経路の暗号鍵", "学習を禁止する規則"],
        answer: [0],
        explanation: "重みは入力信号の強さを調整し、学習によって更新されます。"
      },
      {
        id: "ai-06",
        chapter: "ai",
        type: "single",
        text: "画像認識で局所的な特徴を捉える処理に強いニューラルネットワークはどれですか。",
        choices: ["CNN", "RNN", "LSTM", "n-gramモデル"],
        answer: [0],
        explanation: "CNNは畳み込みによって画像のエッジや形状など局所特徴を捉えるのに向きます。"
      },
      {
        id: "ai-07",
        chapter: "ai",
        type: "single",
        text: "時系列や文章のような順序を持つデータ処理で使われてきたモデルはどれですか。",
        choices: ["RNN", "GAN", "VAE", "SVMのみ"],
        answer: [0],
        explanation: "RNNは過去の状態を次の計算に反映でき、系列データ処理に使われてきました。"
      },
      {
        id: "ai-08",
        chapter: "ai",
        type: "single",
        text: "現在広く実用化されているAIの多くを表す説明として適切なものはどれですか。",

      try {

        return raw ? { ...defaultStats(), ...JSON.parse(raw) } : defaultStats();

    function startSession(mode, chapterId = null) {
      stopTimer();
      const basePool = chapterId
        ? QUESTIONS.filter(q => q.chapter === chapterId)
        : QUESTIONS.slice();
      const weakIds = Object.entries(state.stats.mistakes || {})
        .sort((a, b) => b[1] - a[1])
        .map(([id]) => id);

      let pool = basePool;
      let limit = 10;
      let timeLimit = 0;
      let title = "3分10問";

      if (mode === "quick") {
        limit = 10;
        timeLimit = 180;
        title = "3分10問";
      } else if (mode === "exam") {
        limit = 60;
        timeLimit = 3600;
        title = "60問模試";
      } else if (mode === "review") {
        pool = weakIds.length
          ? weakIds.map(id => QUESTIONS.find(q => q.id === id)).filter(Boolean)
          : shuffle(QUESTIONS).filter((_, index) => index % 3 === 0);
        limit = Math.min(10, Math.max(pool.length, 1));
        title = "弱点復習";
      } else if (mode === "stage") {
        limit = 8;
        title = chapterById(chapterId).short + "ステージ";
      } else {
        limit = 15;
        title = "ランダム15問";
      }

      const questions = takeQuestions(pool, limit);
      state.session = {
        mode,
        chapterId,
        title,
        questions,
        index: 0,
        selected: [],
        answered: false,
        sessionAnswers: [],
        timeLeft: timeLimit,
        timeLimit,
        startedAt: Date.now()
      };

      showScreen("quiz");
      renderQuiz();
      if (timeLimit) startTimer();
    }

    function takeQuestions(pool, limit) {
      const shuffled = shuffle(pool);
      if (shuffled.length >= limit) return shuffled.slice(0, limit);
      const result = shuffled.slice();
      while (result.length < limit) {
        result.push(...shuffle(QUESTIONS).slice(0, limit - result.length));
      }
      return result.slice(0, limit);
    }

    function shuffle(items) {
      return items
        .map(item => ({ item, sort: Math.random() }))
        .sort((a, b) => a.sort - b.sort)
        .map(entry => entry.item);
    }

    function startTimer() {
      stopTimer();
      state.session.timer = setInterval(() => {
        if (!state.session) return stopTimer();
        state.session.timeLeft -= 1;
        if (state.session.timeLeft <= 0) {
          state.session.timeLeft = 0;
          finishSession();
          return;
        }
        updateTimerDom();
      }, 1000);
    }

    function stopTimer() {
      if (state.session?.timer) {
        clearInterval(state.session.timer);
        state.session.timer = null;
      }
    }

    function formatTime(seconds) {
      const safe = Math.max(0, seconds || 0);
      const min = String(Math.floor(safe / 60)).padStart(2, "0");
      const sec = String(safe % 60).padStart(2, "0");
      return `${min}:${sec}`;
    }

    function updateTimerDom() {
      const timerEl = document.getElementById("timerValue");
      if (timerEl && state.session) timerEl.textContent = formatTime(state.session.timeLeft);
    }

    function renderQuiz() {
      const session = state.session;
      const question = session.questions[session.index];
      const chapter = chapterById(question.chapter);
      const progress = Math.round((session.index) / session.questions.length * 100);
      const isMulti = question.type === "multi";

      screens.quiz.innerHTML = `
        <section class="quiz-header">
          <div class="hud-row">
            <button class="icon-btn" id="homeBtn" type="button" aria-label="ホームへ戻る" title="ホームへ戻る">${icon("home")}</button>
            <div class="progress-wrap">
              <div class="progress-meta">
                <span>${session.title}</span>
                <span>${session.index + 1}/${session.questions.length}</span>
              </div>
              <div class="bar" aria-hidden="true"><span style="width:${progress}%"></span></div>
            </div>
            <div class="hud-pill">${session.timeLimit ? icon("clock") : icon("trophy")} <span id="timerValue">${session.timeLimit ? formatTime(session.timeLeft) : state.stats.streak}</span></div>
          </div>
        </section>
        <section class="quiz-main">
          <article class="question-panel">
            <div class="chapter-tag" style="color:${chapter.color}">${icon("book")} ${chapter.label}${isMulti ? '<span class="multi-tag">複数選択</span>' : ""}</div>
            <h2 class="question-text">${escapeHtml(question.text)}</h2>
          </article>
          <section class="answers" aria-label="選択肢">
            ${question.choices.map((choice, index) => answerButton(question, index, choice)).join("")}
          </section>
          <section class="explain ${session.answered ? "show" : ""}" id="explainBox">
            ${session.answered ? explanationMarkup(question) : ""}
          </section>
          <section class="action-row">
            ${isMulti && !session.answered ? '<button class="primary-btn" id="submitBtn" type="button" disabled>' + icon("check") + '回答する</button>' : ""}
            ${session.answered ? '<button class="primary-btn" id="nextBtn" type="button">' + (session.index + 1 === session.questions.length ? icon("trophy") + "結果を見る" : icon("arrow") + "次の問題") + '</button>' : ""}
          </section>
        </section>
      `;

      document.getElementById("homeBtn").addEventListener("click", () => {
        if (confirm("このセッションを終了してホームへ戻りますか？")) {
          stopTimer();
          state.session = null;
          renderHome();
          showScreen("home");
        }
      });

      screens.quiz.querySelectorAll(".answer-btn").forEach(button => {
        button.addEventListener("click", () => selectAnswer(Number(button.dataset.index)));
      });

      const submit = document.getElementById("submitBtn");
      if (submit) submit.addEventListener("click", submitAnswer);

      const next = document.getElementById("nextBtn");
      if (next) next.addEventListener("click", nextQuestion);
    }

    function answerButton(question, index, choice) {
      const session = state.session;
      const isSelected = session.selected.includes(index);
      const answerSet = new Set(question.answer);
      let className = "answer-btn";
      if (isSelected) className += " selected";
      if (session.answered && answerSet.has(index)) className += " correct";
      if (session.answered && isSelected && !answerSet.has(index)) className += " wrong";
      const disabled = session.answered ? "disabled" : "";
      const labels = ["A", "B", "C", "D"];
      return `
        <button class="${className}" type="button" data-index="${index}" ${disabled}>
          <span class="answer-key">${labels[index]}</span>
          <span class="answer-text">${escapeHtml(choice)}</span>
        </button>
      `;
    }

    function selectAnswer(index) {
      const session = state.session;
      if (!session || session.answered) return;
      const question = session.questions[session.index];
      if (question.type === "multi") {
        if (session.selected.includes(index)) {
          session.selected = session.selected.filter(item => item !== index);
        } else {
          session.selected = [...session.selected, index].sort((a, b) => a - b);
        }
        renderQuiz();
        const submit = document.getElementById("submitBtn");
        if (submit) submit.disabled = session.selected.length === 0;
      } else {
        session.selected = [index];
        submitAnswer();
      }
    }

    function submitAnswer() {
      const session = state.session;
      const question = session.questions[session.index];
      if (!session || session.answered || session.selected.length === 0) return;
      const correct = sameAnswer(session.selected, question.answer);
      session.answered = true;
      session.sessionAnswers.push({ id: question.id, chapter: question.chapter, correct });
      recordAnswer(question, correct);
      saveStats();
      renderQuiz();
      showToast(correct ? `正解  +${lastXpGain(correct)}XP` : "不正解  解説を確認");
    }

    function sameAnswer(selected, answer) {
      if (selected.length !== answer.length) return false;
      const left = [...selected].sort((a, b) => a - b);
      const right = [...answer].sort((a, b) => a - b);
      return left.every((value, index) => value === right[index]);
    }

    function lastXpGain(correct) {
      if (!correct) return 0;
      return 12 + Math.min(Math.max(state.stats.streak - 1, 0) * 2, 12);
    }

    function recordAnswer(question, correct) {
      const stats = state.stats;
      stats.total += 1;
      stats.chapters[question.chapter] ||= { total: 0, correct: 0 };
      stats.chapters[question.chapter].total += 1;

      if (correct) {
        stats.correct += 1;
        stats.chapters[question.chapter].correct += 1;
        stats.streak += 1;
        stats.bestStreak = Math.max(stats.bestStreak, stats.streak);
        stats.xp += lastXpGain(true);
        delete stats.mistakes[question.id];
      } else {
        stats.streak = 0;
        stats.mistakes[question.id] = (stats.mistakes[question.id] || 0) + 1;
      }
    }

    function recordSkipped(question) {
      const stats = state.stats;
      stats.total += 1;
      stats.chapters[question.chapter] ||= { total: 0, correct: 0 };
      stats.chapters[question.chapter].total += 1;
      stats.streak = 0;
      stats.mistakes[question.id] = (stats.mistakes[question.id] || 0) + 1;
    }

    function explanationMarkup(question) {
      const session = state.session;
      const latest = session.sessionAnswers[session.sessionAnswers.length - 1];
      const good = latest?.correct;
      return `
        <div class="judge ${good ? "good" : "bad"}">
          ${good ? icon("check") + "正解" : icon("x") + "不正解"}
        </div>
        <p>${escapeHtml(question.explanation)}</p>
      `;
    }

    function nextQuestion() {
      const session = state.session;
      if (!session) return;
      if (session.index + 1 >= session.questions.length) {
        finishSession();
        return;
      }
      session.index += 1;
      session.selected = [];
      session.answered = false;
      renderQuiz();
    }

    function finishSession() {
      const session = state.session;
      if (!session) return;
      stopTimer();
      const answeredIds = new Set(session.sessionAnswers.map(item => item.id));
      session.questions.forEach(question => {
        if (!answeredIds.has(question.id)) {
          session.sessionAnswers.push({ id: question.id, chapter: question.chapter, correct: false, skipped: true });
          recordSkipped(question);
        }
      });
      saveStats();
      renderResult(session);
      state.session = null;
      showScreen("result");
    }

    function renderResult(session) {
      const correct = session.sessionAnswers.filter(answer => answer.correct).length;
      const total = session.questions.length;
      const pct = Math.round(correct / total * 100);
      const rank = pct >= 90 ? "S" : pct >= 75 ? "A" : pct >= 60 ? "B" : "C";
      const summary = resultMessage(pct);
      const chapterRows = CHAPTERS.map(chapter => {
        const items = session.sessionAnswers.filter(answer => answer.chapter === chapter.id);
        if (!items.length) return "";
        const c = items.filter(answer => answer.correct).length;
        return `
          <div class="break-row">
            <span class="break-name">${chapter.label}</span>
            <span class="break-score">${c}/${items.length}</span>
          </div>
        `;
      }).join("");

      screens.result.innerHTML = `
        <section class="result-panel">
          ${rankSvg(rank)}
          <p class="result-score">${pct}%</p>
          <h2 class="result-title">${correct}/${total}問 正解</h2>
          <p class="result-note">${summary}</p>
        </section>
        <section class="breakdown">${chapterRows}</section>
        <section class="action-row">
          <button class="primary-btn" id="againBtn" type="button">${icon("rotate")}もう一度</button>
          <button class="ghost-btn" id="resultHomeBtn" type="button">${icon("home")}ホーム</button>
        </section>
      `;

      document.getElementById("againBtn").addEventListener("click", () => {
        startSession(session.mode, session.chapterId);
      });
      document.getElementById("resultHomeBtn").addEventListener("click", () => {
        renderHome();
        showScreen("home");
      });
    }

    function resultMessage(pct) {
      if (pct >= 90) return "本番形式でも安定しやすい状態です。弱点復習で取りこぼしを減らしましょう。";
      if (pct >= 75) return "基礎はかなり固まっています。リスク・権利・プロンプトの細部を詰めましょう。";
      if (pct >= 60) return "合格圏に近づいています。間違えた問題を短い間隔で復習しましょう。";
      return "まずは各章ステージで用語と判断軸を固めるのが近道です。";
    }

    function showToast(message) {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(state.toastTimer);
      state.toastTimer = setTimeout(() => toast.classList.remove("show"), 1400);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
